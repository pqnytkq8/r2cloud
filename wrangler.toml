# Cloudflare Workers 配置
# 同时支持 Workers 和 Pages 部署

name = "r2cloud"
main = "functions/_middleware.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node scripts/predeploy.mjs"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "r2cloud"
preview_bucket_name = "r2cloud"

[vars]
GUEST = "public/"
"admin:666" = "*"

# 开发服务器
[env.development]
[[env.development.r2_buckets]]
binding = "BUCKET"
bucket_name = "local-bucket"

[dev]
ip = "127.0.0.1"
port = 8787
local_protocol = "http"





