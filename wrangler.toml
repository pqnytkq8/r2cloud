# Cloudflare Workers 配置
# 直接从 GitHub 部署到 Workers

name = "flaredrive"
main = "functions/_middleware.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "production-bucket"
# 本地开发用预览桶
preview_bucket_name = "local-bucket"

# 开发服务器配置
[dev]
ip = "127.0.0.1"
port = 8787
local_protocol = "http"




